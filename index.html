<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome to Jeeva</title>
  <style>
    :root{
      --bg1:#0b3dff; /* deep blue */
      --bg2:#ff2d2d; /* red */
      --text:#ffffff;
    }
    html,body{
      height:100%;
      margin:0;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background: linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 100%);
      background-size:200% 200%;
      animation: gradientShift 12s ease infinite;
      overflow:hidden;
      color:var(--text);
    }

    @keyframes gradientShift{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    /* Centered title */
    .center{
      position:relative;
      z-index:10; /* above stars */
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      pointer-events:none; /* let clicks through */
      padding:2rem;
      box-sizing:border-box;
    }

    h1{
      font-size:clamp(2.2rem,6vw,6rem);
      margin:0;
      letter-spacing:1px;
      text-shadow:0 4px 30px rgba(0,0,0,0.45), 0 0 18px rgba(255,255,255,0.06);
      color: white;
      background: linear-gradient(90deg, rgba(255,255,255,0.98), rgba(255,255,255,0.9));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .subtitle{
      margin-top:0.5rem;
      font-size:clamp(1rem,2.5vw,1.5rem);
      color:rgba(255,255,255,0.9);
      text-shadow:0 2px 6px rgba(0,0,0,0.35);
    }

    /* Moon */
    .moon{
      position:absolute;
      right:8%;
      top:8%;
      width:140px;
      height:140px;
      background: radial-gradient(circle at 35% 30%, #fff 0%, #f0f0f3 30%, #d9dde6 60%, rgba(217,221,230,0.9) 100%);
      border-radius:50%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), inset -12px -8px 30px rgba(0,0,0,0.07);
      z-index:7;
      transform-origin:center;
      animation: moonFloat 6s ease-in-out infinite;
      pointer-events:none;
      opacity:0.95;
    }
    .moon .crater{
      position:absolute;
      background:rgba(0,0,0,0.12);
      border-radius:50%;
      filter: blur(0.4px);
    }
    .moon .c1{ width:28px;height:28px; left:18px; top:26px;}
    .moon .c2{ width:16px;height:16px; left:86px; top:18px;}
    .moon .c3{ width:22px;height:22px; left:58px; top:78px;}

    @keyframes moonFloat{
      0%{ transform: translateY(0) rotate(0deg) }
      50%{ transform: translateY(-8px) rotate(-2deg) }
      100%{ transform: translateY(0) rotate(0deg) }
    }

    /* Stars container */
    .stars{ position:fixed; inset:0; z-index:1; pointer-events:none; }
    .star{
      position:absolute;
      background: radial-gradient(circle at 30% 30%, #fff 0%, rgba(255,255,255,0.9) 30%, rgba(255,255,255,0.2) 70%);
      border-radius:50%;
      opacity:0.9;
      transform:translate3d(0,0,0);
      will-change: transform, opacity;
      filter:drop-shadow(0 0 6px rgba(255,255,255,0.08));
      animation-name: twinkle;
      animation-iteration-count: infinite;
      animation-direction: alternate;
    }

    @keyframes twinkle{
      from{ opacity:0.2; transform: scale(0.6) }
      to{ opacity:1; transform: scale(1.05) }
    }

    /* Floating symbol icons (✶, ✦, ✨) */
    .symbol{
      position:absolute;
      color:rgba(255,255,255,0.9);
      font-size:18px;
      z-index:6;
      opacity:0.9;
      pointer-events:none;
      transform-origin:center;
      text-shadow:0 4px 18px rgba(0,0,0,0.35);
      animation: drift 8s linear infinite;
    }
    @keyframes drift{
      0%{ transform: translateY(0) rotate(0deg); opacity:0 }
      10%{ opacity:0.9 }
      50%{ transform: translateY(-40px) rotate(30deg); opacity:0.8 }
      100%{ transform: translateY(-80px) rotate(60deg); opacity:0 }
    }

    /* small responsive tweaks */
    @media (max-width:600px){
      .moon{ width:90px; height:90px; right:6%; top:6%; }
    }
    /* Heroes: stylized, non-branded SVG characters */
    .heroes{ position:fixed; left:50%; transform:translateX(-50%); bottom:6vh; display:flex; gap:28px; z-index:9; pointer-events:none; }
    .hero{ width:76px; height:76px; display:block; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.45)); transform-origin:center; }
    .hero svg{ width:100%; height:100%; display:block; }
    .hero-1{ animation: floatHero 6.5s ease-in-out infinite; }
    .hero-2{ animation: floatHero 7.8s ease-in-out infinite; animation-delay:0.6s }
    .hero-3{ animation: floatHero 8.6s ease-in-out infinite; animation-delay:1.1s }
    .hero-4{ animation: floatHero 9.2s ease-in-out infinite; animation-delay:1.8s }

    @keyframes floatHero{
      0%{ transform: translateY(0) rotate(0deg) }
      50%{ transform: translateY(-18px) rotate(-6deg) }
      100%{ transform: translateY(0) rotate(0deg) }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <div class="moon" aria-hidden="true">
    <div class="crater c1"></div>
    <div class="crater c2"></div>
    <div class="crater c3"></div>
  </div>

  <main class="center">
    <div>
      <h1>Welcome to Jeeva</h1>
      <div class="subtitle">A simple animated nightscape — blue & red background, moon, and stars.</div>
    </div>
  </main>

  <script>
    // Generate twinkling stars and floating symbols
    (function(){
      const starsContainer = document.querySelector('.stars');
      const STAR_COUNT = 120;
      const W = window.innerWidth;
      const H = window.innerHeight;

      function rand(min,max){ return Math.random()*(max-min)+min }

      for(let i=0;i<STAR_COUNT;i++){
        const el = document.createElement('div');
        el.className = 'star';
        const size = Math.round(rand(1,4));
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = rand(0,100) + '%';
        el.style.top = rand(0,100) + '%';
        el.style.opacity = rand(0.2,1).toFixed(2);
        el.style.animationDuration = (rand(2.5,6)).toFixed(2) + 's';
        el.style.animationDelay = (rand(0,6)).toFixed(2) + 's';
        // subtle horizontal parallax with translateX
        el.style.transform = 'translate3d(0,0,0)';
        starsContainer.appendChild(el);
      }

      // Create a few floating symbol elements for visual interest
      const symbols = ['✨','✶','✦','✸','★'];
      for(let i=0;i<8;i++){
        const s = document.createElement('div');
        s.className = 'symbol';
        s.textContent = symbols[Math.floor(rand(0,symbols.length))];
        s.style.left = rand(5,90)+'%';
        s.style.top = rand(10,80)+'%';
        s.style.fontSize = Math.round(rand(12,34)) + 'px';
        s.style.animationDuration = (rand(6,14)).toFixed(2) + 's';
        s.style.animationDelay = (rand(0,6)).toFixed(2) + 's';
        document.body.appendChild(s);
      }

      // optional: handle resize to not break positioning too badly
      window.addEventListener('resize', function(){
        // no heavy recalculation — stars keep percent positions
      });
    })();
  </script>

  <!-- Stylized hero icons (non-branded) -->
  <div class="heroes" aria-hidden="true">
    <!-- Red masked hero (spider-like color) -->
    <div class="hero hero-1" title="Red hero">
      <svg viewBox="0 0 64 64" aria-hidden="true" role="img">
        <defs>
          <linearGradient id="g1" x1="0" x2="1">
            <stop offset="0" stop-color="#ff4b4b" />
            <stop offset="1" stop-color="#c71d1d" />
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="30" fill="url(#g1)" />
        <!-- mask-like eyes -->
        <path d="M20 28c4-8 12-8 16 0" fill="rgba(0,0,0,0.12)" />
        <ellipse cx="22" cy="32" rx="5" ry="8" fill="#111" opacity="0.9" />
        <ellipse cx="42" cy="32" rx="5" ry="8" fill="#111" opacity="0.9" />
      </svg>
    </div>

    <!-- Blue hero (super-like color) -->
    <div class="hero hero-2" title="Blue hero">
      <svg viewBox="0 0 64 64" aria-hidden="true" role="img">
        <defs>
          <linearGradient id="g2" x1="0" x2="1">
            <stop offset="0" stop-color="#4ba3ff" />
            <stop offset="1" stop-color="#0b61ff" />
          </linearGradient>
        </defs>
        <rect x="4" y="8" width="56" height="48" rx="12" fill="url(#g2)" />
        <!-- simple star/shield motif -->
        <polygon points="32,16 36,28 48,28 38,34 42,46 32,38 22,46 26,34 16,28 28,28" fill="#ffd966" opacity="0.95"/>
      </svg>
    </div>

    <!-- Dark hero (bat-like color) -->
    <div class="hero hero-3" title="Dark hero">
      <svg viewBox="0 0 64 64" aria-hidden="true" role="img">
        <circle cx="32" cy="32" r="30" fill="#0b0b0f" />
        <!-- wing/ear shapes suggestive, non-branded -->
        <path d="M12 34c6-8 18-10 20-10s14 2 20 10c-6 2-12 2-20 2s-14 0-20-2z" fill="#111" opacity="0.85" />
        <rect x="22" y="18" width="20" height="8" rx="4" fill="#222" />
      </svg>
    </div>

    <!-- Maroon hero (deadpool-like color) -->
    <div class="hero hero-4" title="Maroon hero">
      <svg viewBox="0 0 64 64" aria-hidden="true" role="img">
        <defs>
          <linearGradient id="g4" x1="0" x2="1">
            <stop offset="0" stop-color="#b32b2b" />
            <stop offset="1" stop-color="#6f1313" />
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="30" fill="url(#g4)" />
        <path d="M18 24c6 4 22 4 28 0c-6 8-20 10-28 0z" fill="#111" opacity="0.95" />
        <circle cx="24" cy="32" r="5" fill="#fff" opacity="0.95" />
        <circle cx="40" cy="32" r="5" fill="#fff" opacity="0.95" />
      </svg>
    </div>
  </div>
</body>
</html>
